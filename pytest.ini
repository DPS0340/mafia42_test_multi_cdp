[pytest]
# 루트를 import 경로에 추가 → 루트에서 `pytest` 직접 실행해도 megaphone import 가능.
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -p no:cacheprovider
norecursedirs = .git __pycache__ .pytest_cache .hypothesis .venv venv
markers =
    unit: 단위 테스트
    integration: 통합 테스트
    e2e: end-to-end 테스트
    dom: DOM/UI tests (requires Playwright + browser)
